services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: qr_code
      POSTGRES_USER: qr_user
      POSTGRES_PASSWORD: qr_password
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qr_user -d qr_code"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://qr_user:qr_password@db:5432/qr_code
      - BASE_URL=http://localhost
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  db_data:
